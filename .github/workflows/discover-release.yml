name: Discover PECL grpc releases

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      grpc_version:
        description: gRPC version to check. Leave empty to use PECL latest stable.
        required: false
        type: string

permissions:
  actions: write
  contents: read
  packages: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ext-grpc-artifacts
  DISTRO: trixie

jobs:
  discover:
    name: Check latest stable release
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for missing tags
        id: check
        shell: bash
        env:
          REQUESTED_GRPC_VERSION: ${{ inputs.grpc_version }}
        run: |
          set -euo pipefail

          grpc_version="${REQUESTED_GRPC_VERSION}"
          if [[ -z "${grpc_version}" ]]; then
            grpc_version="$(curl -fsSL https://pecl.php.net/rest/r/grpc/stable.txt)"
          fi

          php_versions=("8.4" "8.5")
          arches=("amd64" "arm64")
          missing=0
          for php_version in "${php_versions[@]}"; do
            for arch in "${arches[@]}"; do
              profiles=("pecl")
              if [[ "${arch}" == "amd64" ]]; then
                profiles+=("optimized-amd64-skylake")
              fi
              for profile in "${profiles[@]}"; do
                tag="${IMAGE_NAME}:${grpc_version}-php${php_version}-${DISTRO}-${arch}-${profile}"
                if ! docker buildx imagetools inspect "${tag}" > /dev/null 2>&1; then
                  echo "Missing ${tag}"
                  missing=$((missing + 1))
                fi
              done
            done
          done

          echo "grpc_version=${grpc_version}" >> "${GITHUB_OUTPUT}"
          echo "missing=${missing}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch publish workflow
        if: steps.check.outputs.missing != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${GITHUB_REF_NAME}" \
            --field "grpc_version=${{ steps.check.outputs.grpc_version }}" \
            --field "php_version=all" \
            --field "arch=all" \
            --field "profile=all" \
            --field "force=false"
