name: Publish artifact images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      grpc_version:
        description: gRPC version. Leave as "all" for the full matrix.
        required: true
        default: all
        type: choice
        options:
          - all
          - 1.58.0
          - 1.80.0
      php_version:
        description: PHP version. Leave as "all" for the full matrix.
        required: true
        default: all
        type: choice
        options:
          - all
          - "8.4"
          - "8.5"
      arch:
        description: Architecture. Leave as "all" for the full matrix.
        required: true
        default: all
        type: choice
        options:
          - all
          - amd64
          - arm64
      profile:
        description: Build profile. Leave as "all" for the full matrix.
        required: true
        default: all
        type: choice
        options:
          - all
          - pecl
          - optimized

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ext-grpc-artifacts
  DISTRO: trixie

jobs:
  publish:
    name: grpc ${{ matrix.grpc-version }} / php ${{ matrix.php-version }} / ${{ matrix.arch }} / ${{ matrix.profile }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        grpc-version:
          - 1.58.0
          - 1.80.0
        php-version:
          - "8.4"
          - "8.5"
        arch:
          - amd64
          - arm64
        profile:
          - pecl
          - optimized

    steps:
      - name: Skip filtered matrix entries
        id: filter
        run: |
          should_run=true
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.grpc_version }}" != "all" && "${{ inputs.grpc_version }}" != "${{ matrix.grpc-version }}" ]]; then should_run=false; fi
            if [[ "${{ inputs.php_version }}" != "all" && "${{ inputs.php_version }}" != "${{ matrix.php-version }}" ]]; then should_run=false; fi
            if [[ "${{ inputs.arch }}" != "all" && "${{ inputs.arch }}" != "${{ matrix.arch }}" ]]; then should_run=false; fi
            if [[ "${{ inputs.profile }}" != "all" && "${{ inputs.profile }}" != "${{ matrix.profile }}" ]]; then should_run=false; fi
          fi
          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.filter.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.filter.outputs.should_run == 'true' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.filter.outputs.should_run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push artifact
        if: steps.filter.outputs.should_run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: artifact
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            GRPC_VERSION=${{ matrix.grpc-version }}
            PHP_VERSION=${{ matrix.php-version }}
            DISTRO=${{ env.DISTRO }}
            PROFILE=${{ matrix.profile }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ matrix.grpc-version }}-php${{ matrix.php-version }}-${{ env.DISTRO }}-${{ matrix.arch }}-${{ matrix.profile }}
          cache-from: type=gha,scope=${{ matrix.grpc-version }}-php${{ matrix.php-version }}-${{ env.DISTRO }}-${{ matrix.arch }}-${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.grpc-version }}-php${{ matrix.php-version }}-${{ env.DISTRO }}-${{ matrix.arch }}-${{ matrix.profile }}

